# cliff.toml — Configuration git-cliff pour génération du CHANGELOG
# Voir : https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

Toutes les modifications notables de ce projet sont documentées ici.
Format basé sur [Keep a Changelog](https://keepachangelog.com/fr/1.0.0/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Non publié]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠️ BREAKING{% endif %} \
([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "✨ Nouvelles fonctionnalités" },
  { message = "^fix", group = "🐛 Corrections de bugs" },
  { message = "^perf", group = "⚡ Performances" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^test", group = "🧪 Tests" },
  { message = "^chore\\(deps\\)", group = "📦 Dépendances" },
  { message = "^chore\\(ci\\)", group = "⚙️ CI/CD" },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { body = ".*security", group = "🔒 Sécurité" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
