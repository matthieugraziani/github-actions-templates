version: 2

updates:
  # ── Dépendances Python ─────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Grouper les mises à jour mineures ensemble
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ne pas mettre à jour automatiquement les majeurs
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"

  # ── Docker ─────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
