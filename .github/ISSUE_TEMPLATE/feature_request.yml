name: ✨ Feature Request
description: Proposer une nouvelle fonctionnalité
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème résolu
      description: Quelle friction/problème cette fonctionnalité résout-elle ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considérées

  - type: dropdown
    id: priority
    attributes:
      label: Priorité
      options:
        - Faible — nice to have
        - Moyenne — amélioration notable
        - Haute — bloque un cas d'usage
    validations:
      required: true
