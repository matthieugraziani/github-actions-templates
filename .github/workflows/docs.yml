name: 📚 Docs — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "*.md"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ENABLE_GITHUB_ACTIONS: ${{ vars.ENABLE_GITHUB_ACTIONS || 'true' }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Build MkDocs
  # ──────────────────────────────────────────────
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Pour git-revision-date-localized

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + plugins
        run: |
          pip install mkdocs-material \
            mkdocs-autorefs \
            mkdocstrings[python] \
            mkdocs-git-revision-date-localized \
            mkdocs-minify-plugin

      - name: Build
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  # ──────────────────────────────────────────────
  # 2. Deploy GitHub Pages
  # ──────────────────────────────────────────────
  deploy-docs:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ──────────────────────────────────────────────
  # 3. Vérification des liens (linkchecker)
  # ──────────────────────────────────────────────
  check-links:
    name: Vérification des liens
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.md' '**/*.yml'
          fail: false  # Warning seulement, pas d'échec CI

  # ──────────────────────────────────────────────
  # 4. Génération auto du CHANGELOG
  # ──────────────────────────────────────────────
  update-changelog:
    name: Mise à jour CHANGELOG.md
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: git-cliff — Générer CHANGELOG
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --prepend CHANGELOG.md

      - name: Commit CHANGELOG si modifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: mise à jour automatique du CHANGELOG"
          git push
