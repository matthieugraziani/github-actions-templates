name: 🚀 CD — Release & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Cible de déploiement"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: write
  id-token: write  # OIDC pour PyPI trusted publishing

jobs:
  # ──────────────────────────────────────────────
  # 1. Vérification pré-release
  # ──────────────────────────────────────────────
  pre-release-check:
    name: Vérifications pré-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Vérifier que le tag correspond à pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag $TAG_VERSION ≠ version pyproject.toml $PKG_VERSION"
            exit 1
          fi
          echo "✅ Versions cohérentes : $PKG_VERSION"

  # ──────────────────────────────────────────────
  # 2. Build du package
  # ──────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: pre-release-check
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Vérifier le package
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────
  # 3. Publish sur TestPyPI
  # ──────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'testpypi'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ──────────────────────────────────────────────
  # 4. Publish sur PyPI production
  # ──────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────
  # 5. GitHub Release avec changelog auto
  # ──────────────────────────────────────────────
  github-release:
    name: Créer GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
