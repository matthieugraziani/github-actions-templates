# Configuration pour actions/labeler
# Auto-label les PRs selon les fichiers modifiés

"📦 dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - requirements*.txt
          - pyproject.toml
          - setup.cfg

"🔒 security":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/security.yml
          - "**/auth/**"
          - "**/*security*"

"⚙️ ci/cd":
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - Dockerfile
          - docker-compose*.yml

"📚 docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - "**/*.md"
          - mkdocs.yml

"🧪 tests":
  - changed-files:
      - any-glob-to-any-file:
          - tests/**
          - "**/*test*.py"
          - conftest.py

"🐛 bug":
  - head-branch:
      - "^fix/.*"
      - "^hotfix/.*"
      - "^bugfix/.*"

"✨ feature":
  - head-branch:
      - "^feat/.*"
      - "^feature/.*"

"🔨 refactor":
  - head-branch:
      - "^refactor/.*"
      - "^chore/.*"

"src":
  - changed-files:
      - any-glob-to-any-file:
          - src/**
